<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACCESS.AI Analytics | Class Leaderboard</title>
    <!-- Modern Typography -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./styles.css">
    <style>
        .leaderboard-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .leaderboard-row {
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--accent-blue);
        }

        .leaderboard-row:nth-child(1) {
            border-left-color: gold;
            background: rgba(255, 215, 0, 0.05);
        }

        .leaderboard-row:nth-child(2) {
            border-left-color: silver;
        }

        .leaderboard-row:nth-child(3) {
            border-left-color: #cd7f32;
            /* bronze */
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .rank-badge {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--text-muted);
            width: 30px;
            text-align: center;
        }

        .player-name {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .player-score {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent-green);
        }
    </style>
</head>

<body>

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon"><i class="fa-solid fa-graduation-cap"></i></div>
            <h2>ACCESS.AI</h2>
        </div>
        <nav class="nav-links" id="sidebar-nav">
            <a href="index.html" class="nav-btn"><i class="fa-solid fa-chart-pie"></i> My Insights</a>
            <a href="courses.html" class="nav-btn"><i class="fa-solid fa-book-open"></i> Courses</a>
            <a href="notes.html" class="nav-btn"><i class="fa-solid fa-clipboard"></i> Notes</a>
            <a href="leaderboard.html" class="nav-btn active"><i class="fa-solid fa-trophy"></i> Leaderboard</a>
            <a href="login.html" class="nav-btn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
        </nav>
    </aside>

    <!-- Main Dashboard -->
    <main class="main-content">
        <header class="topbar">
            <h1><i class="fa-solid fa-trophy" style="color: gold"></i> Global Quiz Leaderboard</h1>
        </header>

        <section id="leaderboard-container" class="leaderboard-grid">
            <div style="color: var(--text-muted); padding: 1rem;">Loading rankings...</div>
        </section>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {

            // Adjust sidebar if teacher
            const params = new URLSearchParams(window.location.search);
            if (params.get('mode') === 'teacher') {
                document.getElementById('sidebar-nav').innerHTML = `
                    <a href="teacher.html" class="nav-btn"><i class="fa-solid fa-chart-line"></i> Class Analytics</a>
                    <a href="#" class="nav-btn"><i class="fa-solid fa-users"></i> Students List</a>
                    <a href="leaderboard.html?mode=teacher" class="nav-btn active"><i class="fa-solid fa-trophy"></i> Leaderboard</a>
                    <a href="login.html" class="nav-btn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
                `;
            }

            const leaderboardContainer = document.getElementById('leaderboard-container');

            try {
                // Fetch leaderboard from backend API
                const res = await fetch('http://localhost:3000/api/v1/leaderboard');
                const data = await res.json();

                if (data.success && data.data && data.data.length > 0) {
                    leaderboardContainer.innerHTML = '';

                    data.data.forEach((entry, idx) => {
                        const rank = idx + 1;
                        let rankIcon = rank;
                        if (rank === 1) rankIcon = '<i class="fa-solid fa-award" style="color: gold"></i>';
                        if (rank === 2) rankIcon = '<i class="fa-solid fa-award" style="color: silver"></i>';
                        if (rank === 3) rankIcon = '<i class="fa-solid fa-award" style="color: #cd7f32"></i>';

                        const cardHTML = `
                            <div class="glass-card leaderboard-row">
                                <div class="player-info">
                                    <div class="rank-badge">${rankIcon}</div>
                                    <div class="player-name">${entry.student_name}</div>
                                </div>
                                <div class="player-score">${entry.score}%</div>
                            </div>
                        `;
                        leaderboardContainer.innerHTML += cardHTML;
                    });
                } else {
                    leaderboardContainer.innerHTML = '<div style="color: var(--text-muted); padding: 1rem;">No quiz data available yet!</div>';
                }
            } catch (err) {
                leaderboardContainer.innerHTML = '<div style="color: var(--accent-red); padding: 1rem;">Failed to fetch rankings.</div>';
            }
        });
    </script>
</body>

</html>
