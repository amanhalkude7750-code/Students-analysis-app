<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Translate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --accent-blue: #3b82f6;
            --border-light: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; padding-top: 5rem; }
        
        header {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-light);
            padding: 1rem 2rem; display: flex; align-items: center; z-index: 50;
        }
        .back-btn {
            text-decoration: none; color: var(--text-main);
            font-weight: 600; display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 1rem; border-radius: 0.5rem;
            background: #f1f5f9; transition: 0.2s;
        }
        .back-btn:hover { background: #e2e8f0; }

        .container {
            max-width: 1000px; margin: 0 auto; padding: 2rem;
            display: grid; grid-template-columns: 1fr 350px; gap: 2rem;
        }
        
        @media (max-width: 800px) {
            .container { grid-template-columns: 1fr; }
        }

        .video-container {
            background: #000; border-radius: 1.5rem;
            overflow: hidden; aspect-ratio: 16/9;
            position: relative; border: 4px solid #fff;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        .video-container video {
            width: 100%; height: 100%; object-fit: cover;
            transform: scaleX(-1);
        }
        
        .panel {
            background: #fff; border-radius: 1.5rem; padding: 2rem;
            border: 1px solid var(--border-light);
            display: flex; flex-direction: column;
        }
        .panel h2 { font-family: 'Outfit', sans-serif; margin-bottom: 1rem; font-size: 1.5rem; }
        
        .tokens-box {
            background: #f8fafc; border: 1px solid var(--border-light);
            border-radius: 1rem; padding: 1rem; flex: 1;
            display: flex; flex-wrap: wrap; align-content: flex-start; gap: 0.5rem;
            margin-bottom: 1rem; min-height: 150px;
        }
        .token {
            background: var(--accent-blue); color: white;
            padding: 0.25rem 0.75rem; border-radius: 999px;
            font-size: 0.875rem; font-weight: 600;
        }

        .translation-box {
            background: #eff6ff; border: 1px solid #bfdbfe;
            border-radius: 1rem; padding: 1.5rem;
        }
        .translation-box h3 { color: #1e3a8a; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
        .translation-box p { font-size: 1.25rem; font-weight: 600; color: #1e40af; }

        .controls { display: flex; gap: 1rem; margin-top: 1rem; }
        .btn {
            flex: 1; padding: 1rem; border: none; border-radius: 0.75rem;
            font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-primary { background: var(--accent-blue); color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        
        .loading { display: none; margin-top: 1rem; text-align: center; color: var(--accent-blue); font-weight: 600; }
    </style>
</head>
<body>

    <header>
        <a href="accessibility.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Hub</a>
        <h1 style="margin-left: 2rem; font-family: 'Outfit'; font-size: 1.5rem;">Sign Language Translator</h1>
    </header>

    <div class="container">
        <!-- Video Feed -->
        <div class="video-container">
            <video id="webcam" autoplay playsinline muted></video>
            <div style="position: absolute; top: 1rem; left: 1rem; background: rgba(0,0,0,0.5); color: white; padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.75rem; font-weight: bold; display: flex; align-items: center; gap: 0.5rem;">
                <div style="width: 8px; height: 8px; background: #ef4444; border-radius: 50%; box-shadow: 0 0 10px #ef4444;"></div>
                LIVE
            </div>
        </div>

        <!-- Translation Panel -->
        <div class="panel">
            <h2>Detected Signs</h2>
            <div class="tokens-box" id="tokens">
                <span style="color: var(--text-muted); font-size: 0.9rem;">Start signing to see tokens...</span>
            </div>
            
            <div class="translation-box">
                <h3>Sentence Translation</h3>
                <p id="translation">Waiting for input...</p>
            </div>
            
            <div id="loading" class="loading"><i class="fa-solid fa-circle-notch fa-spin"></i> Translating via AI...</div>

            <div class="controls">
                <button class="btn btn-primary" onclick="simulateSign()">Simulate Sign</button>
                <button class="btn btn-danger" onclick="translateSigns()">Translate</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const tokensBox = document.getElementById('tokens');
        const translationText = document.getElementById('translation');
        const loading = document.getElementById('loading');
        
        let currentTokens = [];
        const DEMO_SIGNS = ["HELLO", "ME", "DEAF", "NEED", "HELP", "THANK YOU", "WATER", "WANT"];

        // Setup Webcam
        async function setupWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                console.error("Webcam access denied:", err);
            }
        }
        setupWebcam();

        function renderTokens() {
            if (currentTokens.length === 0) {
                tokensBox.innerHTML = '<span style="color: var(--text-muted); font-size: 0.9rem;">Start signing to see tokens...</span>';
                return;
            }
            tokensBox.innerHTML = '';
            currentTokens.forEach(token => {
                const span = document.createElement('span');
                span.className = 'token';
                span.textContent = token;
                tokensBox.appendChild(span);
            });
        }

        function simulateSign() {
            const randomSign = DEMO_SIGNS[Math.floor(Math.random() * DEMO_SIGNS.length)];
            currentTokens.push(randomSign);
            renderTokens();
        }

        async function translateSigns() {
            if (currentTokens.length === 0) return;
            
            loading.style.display = 'block';
            translationText.textContent = '';
            
            try {
                const response = await fetch('/api/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tokens: currentTokens })
                });
                
                if (!response.ok) throw new Error('API Error');
                
                const data = await response.json();
                translationText.textContent = data.response;
            } catch (err) {
                console.warn("Backend failed, using offline mock mode.");
                translationText.textContent = `(Offline Translation) ${currentTokens.join(" ")}`;
            } finally {
                loading.style.display = 'none';
                currentTokens = [];
                setTimeout(renderTokens, 2000); // clear tokens after delay
            }
        }
    </script>
</body>
</html>
