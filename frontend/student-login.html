<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACCESS.AI | Student Login</title>
    <!-- Modern Typography -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./styles.css">
    <style>
        body {
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 10;
        }

        .logo {
            margin-bottom: 2rem;
            justify-content: center;
        }

        .login-title {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
        }

        .input-group {
            width: 100%;
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-blue);
        }

        .input-wrapper i {
            padding: 0 1rem;
            color: var(--text-muted);
        }

        .input-wrapper input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 1rem 1rem 1rem 0;
            outline: none;
            font-family: var(--font-body);
            font-size: 1rem;
        }

        .options {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 0.85rem;
            margin-bottom: 2.5rem;
        }

        .options a {
            color: var(--accent-blue);
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .options a:hover {
            opacity: 0.8;
        }

        .options label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            width: 100%;
            margin-bottom: 1.5rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-light);
        }

        .divider:not(:empty)::before {
            margin-right: .5em;
        }

        .divider:not(:empty)::after {
            margin-left: .5em;
        }

        .social-login {
            display: flex;
            gap: 1rem;
            width: 100%;
        }

        .btn-social {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-light);
            padding: 0.8rem;
            border-radius: 12px;
            color: var(--text-main);
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .btn-social:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .glow-bg {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="glow-bg"></div>
    <div class="login-container glass-card">
        <div class="logo">
            <div class="logo-icon"><i class="fa-solid fa-graduation-cap"></i></div>
            <h2>ACCESS.AI</h2>
        </div>
        <h1 class="login-title">Student Portal</h1>
        <p class="login-subtitle">Sign in to access your localized telemetry and learning path.</p>
        <div style="width: 100%;">
            <div class="input-group"><label>Email Address</label>
                <div class="input-wrapper"><i class="fa-regular fa-envelope"></i><input type="email"
                        placeholder="alex.researcher@university.edu" required></div>
            </div>
            <div class="input-group"><label>Password</label>
                <div class="input-wrapper"><i class="fa-solid fa-lock"></i><input type="password" placeholder="••••••••"
                        required></div>
            </div>
            <div class="options"><label><input type="checkbox">Remember me</label><a href="#">Forgot password?</a></div>

            <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                <button type="button" onclick="window.location.href='index.html'" class="btn-primary login-btn"
                    style="margin-bottom: 0; width: 100%;"><i class="fa-solid fa-user-graduate"></i> Login as
                    Student</button>
            </div>
        </div>
        <div class="divider">OR CONTINUE WITH</div>
        <div class="social-login"><button class="btn-social"><i class="fa-brands fa-google"></i></button><button
                class="btn-social"><i class="fa-brands fa-github"></i></button><button class="btn-social"><i
                    class="fa-brands fa-microsoft"></i></button></div>
    </div>
</body>

</html>
