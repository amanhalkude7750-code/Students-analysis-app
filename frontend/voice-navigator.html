<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Navigator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --accent-green: #10b981;
            --border-light: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; padding-top: 5rem; }
        
        header {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-light);
            padding: 1rem 2rem; display: flex; align-items: center; z-index: 50;
        }
        .back-btn {
            text-decoration: none; color: var(--text-main);
            font-weight: 600; display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 1rem; border-radius: 0.5rem;
            background: #f1f5f9; transition: 0.2s;
        }
        .back-btn:hover { background: #e2e8f0; }

        .container {
            max-width: 800px; margin: 0 auto; padding: 2rem; text-align: center;
        }

        .mic-button {
            width: 150px; height: 150px; border-radius: 50%;
            background: var(--accent-green); color: white;
            font-size: 4rem; display: flex; align-items: center; justify-content: center;
            margin: 4rem auto; border: none; cursor: pointer;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
            transition: all 0.3s ease; position: relative;
        }
        
        .mic-button.listening {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); transform: scale(1); }
            70% { box-shadow: 0 0 0 30px rgba(16, 185, 129, 0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); transform: scale(1); }
        }

        .transcript-box {
            background: white; border: 1px solid var(--border-light);
            border-radius: 1.5rem; padding: 2rem;
            min-height: 150px; font-size: 1.5rem; font-weight: 600;
            color: #064e3b; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            display: flex; align-items: center; justify-content: center;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .system-response {
            margin-top: 2rem; font-size: 1.2rem; color: var(--text-muted);
        }

    </style>
</head>
<body>

    <header>
        <a href="accessibility.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Hub</a>
        <h1 style="margin-left: 2rem; font-family: 'Outfit'; font-size: 1.5rem; color: #047857;">Voice Navigator</h1>
    </header>

    <div class="container">
        
        <h2 style="font-family: 'Outfit'; font-size: 2.5rem; margin-bottom: 1rem;">Audio Interface</h2>
        <p style="color: #64748b; font-size: 1.1rem; margin-bottom: 2rem;">Tap the microphone and say a command like "Read Courses", "Go Back", or "Read Notifications".</p>

        <div class="transcript-box" id="transcript">
            <span style="color: #94a3b8; font-size: 1rem; text-transform: none;">Waiting for command...</span>
        </div>

        <button class="mic-button" id="micBtn" onclick="toggleListening()">
            <i class="fa-solid fa-microphone"></i>
        </button>

        <p class="system-response" id="systemResponse"></p>
    </div>

    <script>
        const micBtn = document.getElementById('micBtn');
        const transcriptBox = document.getElementById('transcript');
        const systemResponse = document.getElementById('systemResponse');
        
        let recognition = null;
        let isListening = false;

        if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;

            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.add('listening');
                transcriptBox.innerHTML = '<span style="color: #94a3b8; font-size: 1rem; text-transform: none;">Listening...</span>';
                systemResponse.textContent = '';
            };

            recognition.onresult = (event) => {
                const transcript = Array.from(event.results)
                    .map(result => result[0].transcript)
                    .join('');
                transcriptBox.textContent = transcript;
            };

            recognition.onend = () => {
                isListening = false;
                micBtn.classList.remove('listening');
                const finalCommand = transcriptBox.textContent.trim().toUpperCase();
                
                if (finalCommand && finalCommand !== "WAITING FOR COMMAND..." && finalCommand !== "LISTENING...") {
                    executeCommand(finalCommand);
                } else {
                    transcriptBox.innerHTML = '<span style="color: #94a3b8; font-size: 1rem; text-transform: none;">Waiting for command...</span>';
                }
            };
        } else {
            transcriptBox.innerHTML = '<span style="color: #ef4444; font-size: 1rem; text-transform: none;">Speech Recognition API not supported in this browser. Try Chrome.</span>';
        }

        function toggleListening() {
            if (!recognition) return;
            if (isListening) {
                recognition.stop();
            } else {
                recognition.start();
            }
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                window.speechSynthesis.speak(utterance);
            }
        }

        function executeCommand(command) {
            if (command.includes("READ")) {
                systemResponse.textContent = "System: Reading requested content aloud.";
                speak("Reading requested content aloud. You have 3 new notifications and 2 courses in progress.");
            } else if (command.includes("BACK")) {
                systemResponse.textContent = "System: Navigating back.";
                speak("Navigating back to main hub.");
                setTimeout(() => window.location.href = "accessibility.html", 2000);
            } else {
                systemResponse.textContent = `System: Command "${command}" not recognized.`;
                speak("Command not recognized. Please try again.");
            }
        }
    </script>
</body>
</html>
