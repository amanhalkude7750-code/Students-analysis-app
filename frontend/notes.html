<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACCESS.AI Analytics | My Notes</title>
    <!-- Modern Typography -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./styles.css">
    <style>
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .note-card {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            border-top: 4px solid var(--accent-purple);
        }

        .note-date {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>

<body>

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon"><i class="fa-solid fa-graduation-cap"></i></div>
            <h2>ACCESS.AI</h2>
        </div>
        <nav class="nav-links">
            <a href="index.html" class="nav-btn"><i class="fa-solid fa-chart-pie"></i> My Insights</a>
            <a href="courses.html" class="nav-btn"><i class="fa-solid fa-book-open"></i> Courses</a>
            <a href="notes.html" class="nav-btn active"><i class="fa-solid fa-clipboard"></i> Notes</a>
            <a href="leaderboard.html" class="nav-btn"><i class="fa-solid fa-trophy"></i> Leaderboard</a>
            <a href="login.html" class="nav-btn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
        </nav>
    </aside>

    <!-- Main Dashboard -->
    <main class="main-content">
        <header class="topbar">
            <h1><i class="fa-solid fa-clipboard" style="color: var(--accent-purple)"></i> Saved Notes & AI Summaries
            </h1>
        </header>

        <!-- Add General Note Section has been removed by request -->

        <section id="notes-container" class="notes-grid">
            <div style="color: var(--text-muted); padding: 1rem;">Loading your notes...</div>
        </section>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const notesContainer = document.getElementById('notes-container');
            const urlParams = new URLSearchParams(window.location.search);
            const studentId = urlParams.get('id') || localStorage.getItem('studentId') || 101;

            // Update user info if elements exist
            const userNameEl = document.querySelector('.user-name');
            if (userNameEl) {
                const activeUser = JSON.parse(localStorage.getItem('activeUser') || '{}');
                userNameEl.textContent = activeUser.name || 'Alex Researcher';
            }

            // Fetch and render notes
            const loadNotes = async () => {
                notesContainer.innerHTML = '<div style="color: var(--text-muted); padding: 1rem;">Loading your notes...</div>';
                try {
                    const res = await fetch(`/api/v1/notes/${studentId}`);
                    const data = await res.json();

                    if (data.success && data.data && data.data.length > 0) {
                        notesContainer.innerHTML = '';

                        // Sort notes by timestamp (newest first)
                        const sortedNotes = data.data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

                        sortedNotes.forEach(note => {
                            const dateObj = new Date(note.timestamp);
                            const displayDate = dateObj.toLocaleDateString() + ' ' + dateObj.toLocaleTimeString();

                            const courseLabel = note.course_id === 'General' ? 'General Note' : `Course ${note.course_id}`;

                            notesContainer.innerHTML += `
                                <div class="glass-card note-card" style="animation: fadeInUp 0.4s ease-out forwards;">
                                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                        <div>
                                            <h3 style="font-size: 1.1rem; color: var(--accent-purple);">${courseLabel}</h3>
                                            <span class="note-date"><i class="fa-regular fa-clock"></i> ${displayDate}</span>
                                        </div>
                                        <div class="note-tag" style="background: rgba(0,0,0,0.05); padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600;">ID: ${note.id.toString().slice(-4)}</div>
                                    </div>
                                    <div style="border-left: 3px solid rgba(0,0,0,0.05); padding-left: 1rem; margin: 0.5rem 0;">
                                        <p style="font-size: 0.95rem; line-height: 1.6; color: var(--text-main); white-space: pre-wrap;">${note.notes}</p>
                                    </div>
                                    ${note.summary ? `
                                    <div style="background: rgba(138, 75, 230, 0.05); padding: 0.8rem; border-radius: 8px; font-size: 0.85rem; border: 1px dashed var(--accent-purple);">
                                        <strong style="color: var(--accent-purple); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05rem;">AI Summary</strong>
                                        <p style="margin-top: 0.3rem; font-style: italic;">${note.summary}</p>
                                    </div>` : ''}
                                </div>
                            `;
                        });
                    } else {
                        notesContainer.innerHTML = `
                            <div style="grid-column: 1/-1; text-align: center; padding: 4rem 2rem;">
                                <div style="font-size: 3rem; color: var(--border-light); margin-bottom: 1.5rem;"><i class="fa-solid fa-note-sticky"></i></div>
                                <h2 style="color: var(--text-muted);">No notes saved yet</h2>
                                <p style="color: var(--text-muted); margin-top: 0.5rem;">Watch a video and take some notes to see them here!</p>
                                <a href="courses.html" class="btn-primary" style="display: inline-block; margin-top: 1.5rem; text-decoration: none;">Browse Courses</a>
                            </div>
                        `;
                    }
                } catch (err) {
                    console.error("Fetch error:", err);
                    notesContainer.innerHTML = '<div style="color: var(--accent-red); padding: 1rem;">Failed to fetch notes from the server. Please ensure the backend is running.</div>';
                }
            };

            // Initial Load
            loadNotes();
        });

    </script>
</body>

</html>
