<!DOCTYPE html>
<html>
<head>

<title>Student Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<div class="sidebar">

<h2>LearnAI</h2>

<ul>
<li>Dashboard</li>
<li>Courses</li>
<li>Analytics</li>
<li>Settings</li>
</ul>

</div>

<div class="main">

<h1>Learning Analytics</h1>

<div class="cards">

<div class="card">
<h3>Study Time</h3>
<p>2.5 hrs</p>
</div>

<div class="card">
<h3>Videos Completed</h3>
<p>6</p>
</div>

<div class="card">
<h3>Focus Score</h3>
<p>82%</p>
</div>

<div class="card">
<h3>Learning Style</h3>
<p>Visual</p>
</div>

</div>

<h2>Weekly Study Activity</h2>

<canvas id="studyChart"></canvas>

<h2>Recommended Actions</h2>

<div class="recommend">

<p>• Review Module 3</p>
<p>• Take Practice Quiz</p>
<p>• Watch recap video</p>

</div>

<a href="video.html">
<button class="learn-btn">Continue Learning</button>
</a>

</div>

</div>

<script src="js/charts.js"></script>

</body>
</html>
